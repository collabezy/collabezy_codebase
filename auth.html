<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Influencer Login - Collabezy</title>
  <link rel="icon" type="image/png" href="./cezy2-1.png">
  <script type="module" crossorigin src="./assets/auth-bTewZjyD.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/insforge-D28RsFYD.js">
  <link rel="modulepreload" crossorigin href="./assets/style-CAvnQPbK.js">
  <link rel="stylesheet" crossorigin href="./assets/style-D5311d6m.css">
</head>
<body>
  <!-- Navbar for Auth Page -->
  <nav class="navbar glass-panel">
    <div class="nav-content">
      <a href="/" class="title small-title">Collabezy</a>
      <div class="nav-links">
        <a href="/">Home</a>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="glass-panel auth-panel">
      <div class="text-center mb-6">
        <h1 class="title mb-1">Influencer Login</h1>
        <p class="subtitle">Connect. Collaborate. Create.</p>
      </div>

      <form id="auth-form" class="mt-4">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••" />
        </div>
        <div class="form-group" id="confirm-password-group" style="display: none;">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="••••••••" />
        </div>
        <div class="form-group text-center mt-4">
          <button type="submit" class="btn btn-primary" id="submit-btn">Login</button>
        </div>
      </form>

      <div id="auth-message" class="mt-4 text-center" style="display: none;"></div>

      <div class="text-center mt-4">
        <span class="subtitle">
          <span id="toggle-text">Don't have an account?</span>
          <a href="#" class="toggle-mode" id="toggle-mode-btn">Sign Up</a>
        </span>
      </div>
    </div>
  </div>
</body>
</html>
