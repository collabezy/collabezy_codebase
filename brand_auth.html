<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Portal - Collabezy</title>
  <link rel="icon" type="image/png" href="./cezy2-1.png">
  <script type="module" crossorigin src="./assets/brand_auth-BFqdO5u5.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/insforge-D28RsFYD.js">
  <link rel="modulepreload" crossorigin href="./assets/style-CAvnQPbK.js">
  <link rel="stylesheet" crossorigin href="./assets/style-D5311d6m.css">
</head>
<body>
  <div class="auth-container">
    <div class="glass-panel" style="width: 100%; max-width: 400px; padding: 2.5rem;">
      <div class="text-center mb-8">
        <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;" id="auth-title">Brand Login</h1>
        <p class="subtitle" id="auth-subtitle">Sign in to manage your campaigns</p>
      </div>

      <form id="auth-form">
        <div class="form-group">
          <label>Work Email</label>
          <input type="email" id="email" placeholder="name@company.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div class="form-group" id="confirm-password-group" style="display: none;">
          <label>Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="••••••••" required>
        </div>
        
        <div id="auth-message" class="mt-4 mb-4 text-center" style="display: none;"></div>
        
        <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
      </form>

      <div class="text-center mt-8">
        <p class="subtitle" style="font-size: 0.9rem;">
          <span id="toggle-text">Don't have a brand account?</span>
          <a href="#" id="toggle-mode-btn" style="color: var(--primary); font-weight: 500; margin-left: 0.25rem;">Sign Up</a>
        </p>
      </div>
      
      <div class="text-center mt-6">
        <a href="/index.html" style="font-size: 0.85rem; color: var(--text-muted);">← Back to Landing Page</a>
      </div>
    </div>
  </div>
</body>
</html>
