<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Influencer Brand Collab</title>
  <style>
    .admin-badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #ef4444;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
    }
  </style>
  <script type="module" crossorigin src="/assets/admin_login-C1koMtYW.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/insforge-gvpOEqFn.js">
  <link rel="modulepreload" crossorigin href="/assets/style-BMUfA7TY.js">
  <link rel="stylesheet" crossorigin href="/assets/style-CO-q1XwB.css">
</head>
<body>
  <div class="auth-container">
    <div class="glass-panel">
      <div class="text-center mb-6">
        <span class="admin-badge">Restricted Access</span>
        <h1 class="title mb-1">Admin Console</h1>
        <p class="subtitle">Sign in to manage the platform</p>
      </div>

      <form id="admin-login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="admin@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter your password" autocomplete="current-password" />
        </div>

        <div class="form-group text-center mt-4">
          <button type="submit" class="btn btn-primary" id="submit-btn">Login to Console</button>
        </div>
      </form>

      <div id="admin-message" class="mt-4 text-center" style="display: none;"></div>

      <div class="text-center mt-6">
        <a href="/" class="subtitle" style="text-decoration: none;">← Back to Website</a>
      </div>
    </div>
  </div>

</body>
</html>
