<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Influencer Login - Brand Collab</title>
  <script type="module" crossorigin src="/assets/auth-BebOwMl7.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/insforge-gvpOEqFn.js">

  <link rel="stylesheet" crossorigin href="/assets/style-CO-q1XwB.css">
</head>
<body>
  <!-- Navbar for Auth Page -->
  <nav class="navbar glass-panel">
    <div class="nav-content">
      <a href="/" class="title small-title">Brand Collab</a>
      <div class="nav-links">
        <a href="/">Home</a>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="glass-panel auth-panel">
      <div class="text-center mb-6">
        <h1 class="title mb-1">Influencer Login</h1>
        <p class="subtitle">Connect. Collaborate. Create.</p>
      </div>

      <button class="btn btn-secondary google-btn mb-4" id="google-login-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
          <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
            <path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/>
            <path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/>

            <path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z"/>
          </g>
        </svg>
        <span style="margin-left: 8px;">Continue with Google</span>
      </button>

      <div class="divider">
        <span>or continue with email</span>
      </div>

      <form id="auth-form" class="mt-4">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••" />
        </div>
        <div class="form-group text-center mt-4">
          <button type="submit" class="btn btn-primary" id="submit-btn">Login</button>
        </div>
      </form>

      <div id="auth-message" class="mt-4 text-center" style="display: none;"></div>

      <div class="text-center mt-4">
        <span class="subtitle">
          <span id="toggle-text">Don't have an account?</span>
          <a href="#" class="toggle-mode" id="toggle-mode-btn">Sign Up</a>
        </span>
      </div>
    </div>
  </div>
</body>
</html>
