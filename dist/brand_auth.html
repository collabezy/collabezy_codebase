<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Portal - Influencer Brand Collab</title>
  <script type="module" crossorigin src="/assets/brand_auth-BmJHK6Mr.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/insforge-gvpOEqFn.js">
  <link rel="modulepreload" crossorigin href="/assets/style-BMUfA7TY.js">
  <link rel="stylesheet" crossorigin href="/assets/style-CO-q1XwB.css">
</head>
<body>
  <div class="auth-container">
    <div class="glass-panel" style="width: 100%; max-width: 400px; padding: 2.5rem;">
      <div class="text-center mb-8">
        <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;" id="auth-title">Brand Login</h1>
        <p class="subtitle" id="auth-subtitle">Sign in to manage your campaigns</p>
      </div>

      <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
        <button id="google-login-btn" class="btn btn-secondary" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1.01.69-2.29 1.12-3.71 1.12-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.17A6.93 6.93 0 0 1 5.45 12c0-.77.13-1.52.39-2.17V6.99H2.18A11.996 11.996 0 0 0 0 12c0 1.88.43 3.69 1.18 5.31l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 6.99l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
      </div>

      <div class="text-center mb-6" style="color: var(--text-muted); font-size: 0.85rem;">or continue with email</div>

      <form id="auth-form">
        <div class="form-group">
          <label>Work Email</label>
          <input type="email" id="email" placeholder="name@company.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        
        <div id="auth-message" class="mt-4 mb-4 text-center" style="display: none;"></div>
        
        <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
      </form>

      <div class="text-center mt-8">
        <p class="subtitle" style="font-size: 0.9rem;">
          <span id="toggle-text">Don't have a brand account?</span>
          <a href="#" id="toggle-mode-btn" style="color: var(--primary); font-weight: 500; margin-left: 0.25rem;">Sign Up</a>
        </p>
      </div>
      
      <div class="text-center mt-6">
        <a href="/index.html" style="font-size: 0.85rem; color: var(--text-muted);">← Back to Landing Page</a>
      </div>
    </div>
  </div>
</body>
</html>
