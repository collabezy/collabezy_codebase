<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Influencers - Collabezy</title>
    <link rel="icon" type="image/png" href="./cezy2-1.png">
    <style>
        .filter-bar {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .influencer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .influencer-card {
            transition: transform 0.2s;
            cursor: pointer;
        }
        .influencer-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .stat-badge {
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            color: var(--text-muted);
        }
    </style>
  <script type="module" crossorigin src="./assets/discover-BRgq6hdA.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/insforge-D28RsFYD.js">
  <link rel="modulepreload" crossorigin href="./assets/style-BqVZ4CSq.js">
  <link rel="modulepreload" crossorigin href="./assets/analytics-8ww5WDR9.js">
  <link rel="stylesheet" crossorigin href="./assets/style-CJaI28KQ.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2 class="title" style="font-size: 1.25rem;">Collabezy</h2>
            <p class="subtitle mb-4 text-center" style="font-size: 0.8rem; background: rgba(236,72,153,0.1); color: #ec4899; padding: 0.25rem; border-radius: 4px;">BRAND PORTAL</p>
            <ul class="sidebar-nav">
                <li><a href="/brand_dashboard.html" id="nav-overview">Overview</a></li>
                <li><a href="#" class="active" id="nav-discover">Discover</a></li>
                <li><a href="/brand_dashboard.html#promotion-list" id="nav-list">My Promotions</a></li>
                <li><a href="#" id="logout-btn">Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="flex-between mb-8">
                <div>
                    <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Discover Influencers</h1>
                    <p class="subtitle">Find the perfect creator for your brand</p>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label>Category</label>
                    <select id="filter-category">
                        <option value="">All Categories</option>
                        <option value="Tech">Tech</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Lifestyle">Lifestyle</option>
                        <option value="Gaming">Gaming</option>
                        <option value="Beauty">Beauty</option>
                        <option value="Food">Food</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label>Platform</label>
                    <select id="filter-platform">
                        <option value="">Any Platform</option>
                        <option value="youtube">YouTube</option>
                        <option value="instagram">Instagram</option>
                        <option value="tiktok">TikTok</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; align-items: flex-end; padding-bottom: 0.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="filter-verified" style="width: auto;"> Verified Only
                    </label>
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button id="apply-filters-btn" class="btn btn-primary" style="padding: 0.75rem 1.5rem;">Filter</button>
                </div>
            </div>

            <!-- Influencer Grid -->
            <div id="influencer-container" class="influencer-grid">
                <p class="subtitle text-center" style="grid-column: 1/-1;">Loading influencers...</p>
            </div>
        </main>
    </div>
</body>
</html>
